name: Daily weather build
on:
  schedule:
    - cron: '0 3 * * *'   # 3h UTC = 5h Paris (été, CEST) / 4h Paris (hiver, CET)
  workflow_dispatch:

jobs:
  trigger-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
